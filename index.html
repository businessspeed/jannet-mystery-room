<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Mystery Room</title>
  <style>
    body {
      background-color: #000;
      color: gold;
      font-family: Georgia, serif;
      text-align: center;
      padding: 2em;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 0.2em;
    }
    p.subtitle {
      font-size: 1.3em;
      color: #ccc;
    }
    .countdown {
      font-size: 1.2em;
      color: #999;
      margin-top: 1.5em;
    }
    .cta-form input, .cta-form button {
      padding: 0.8em;
      margin: 0.5em;
      font-size: 1em;
      border: none;
      border-radius: 4px;
    }
    .cta-form input {
      width: 250px;
    }
    .cta-form button {
      background-color: gold;
      color: black;
      cursor: pointer;
    }
    video {
      margin-top: 2em;
      border: 1px solid gold;
    }
    #veron-chat {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #111;
      color: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      max-width: 300px;
      z-index: 999;
      font-size: 0.9em;
    }
    #veron-chat h4 {
      margin: 0 0 10px;
      color: gold;
    }
  </style>
</head>
<body>
  <script>
  const access = prompt("Enter access password:");
  const correctPassword = "jannetolivier23";
  if (access !== correctPassword) {
    document.body.innerHTML = "<h1 style='color: red; text-align:center; margin-top:20%'>Access Denied</h1>";
  }
</script>
  <h1>The Mystery Room</h1>
  <p class="subtitle">Only one brand will own the mask.</p>

  <video width="640" height="360" controls poster="placeholder.jpg">
    <source src="teaser-video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <form class="cta-form">
    <h2>Claim the Mask</h2>
    <input type="text" name="fullname" placeholder="Your Full Name" required><br>
    <input type="text" name="brand" placeholder="Brand You Represent" required><br>
    <input type="email" name="email" placeholder="Business Email" required><br>
    <button type="submit">Request Access</button>
  </form>

  <div class="countdown">
    ⏳ <span id="countdown-timer"></span> left until the Mask is claimed forever
  </div>

  <div id="veron-chat">
    <h4>Verón™ Whisper Agent</h4>
    <p>Welcome. You're not just here to visit — you're here to make a move. One chance. One mask. I'm listening...</p>
  </div>

  <script>
    const countdownElement = document.getElementById("countdown-timer");
    const deadline = new Date(Date.now() + 72 * 60 * 60 * 1000);

    function updateCountdown() {
      const now = new Date();
      const diff = deadline - now;

      if (diff <= 0) {
        countdownElement.textContent = "Time’s up.";
        return;
      }

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      countdownElement.textContent = `${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
