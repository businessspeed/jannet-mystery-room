
<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tajanstvena Soba</title>
  <style>
    body {
      background-color: #000;
      color: gold;
      font-family: 'Georgia', serif;
      padding: 2em;
      text-align: center;
    }
    .subtitle {
      color: #ccc;
    }
    .veron {
      margin-top: 2em;
      padding: 1em;
      border: 2px dashed gold;
      background: #111;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <script>
    // Simple access gate; sets a flag so later scripts can decide whether to run
    const access = prompt("Enter access password:");
    const correctPassword = "jannetolivier23";
    if (access !== correctPassword) {
      document.body.innerHTML = "<h1 style='color: red'>Access denied</h1>";
      window.__accessGranted = false;
    } else {
      window.__accessGranted = true;
    }
  </script>

  <h1>Tajanstvena soba je uživo</h1>
  <p class="subtitle">Dobrodošli. Ovdje počinje vaše AI partnerstvo.</p>

  <form id="claimForm">
    <h2>Zatraži pristup</h2>
    <input type="text" id="fullname" placeholder="Ime i prezime" required><br><br>
    <input type="text" id="brand" placeholder="Brend koji zastupate" required><br><br>
    <input type="email" id="email" placeholder="Email adresa" required><br><br>
    <button type="submit">Pošalji zahtjev</button>
  </form>

  <div class="veron">
    <h3>🤖 Verón AI Whisper Agent</h3>
    <p>Prvi digitalni agent povjerenja. Više uskoro...</p>
  </div>

  <script>
    // Stop here if access was denied
    if (window.__accessGranted === false) {
      // Do not bind any listeners
    } else {
      // Configure Supabase; leave empty if not yet provisioned
      const SUPABASE_URL = 'https://perkmjptmwcaaclahtml.supabase.co';
      const SUPABASE_KEY = '';

      // Create client only when config looks valid
      let supabaseClient = null;
      const urlLooksValid = /^https:\/\/[a-z0-9-]+\.supabase\.co$/i.test(SUPABASE_URL);
      if (window.supabase && urlLooksValid && SUPABASE_KEY) {
        try {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (err) {
          console.warn('Supabase init failed:', err);
        }
      }

      const formEl = document.getElementById('claimForm');
      if (!formEl) {
        // Form not present (e.g., access denied page). Nothing to do.
      } else {
        formEl.addEventListener('submit', async function (e) {
          e.preventDefault();

          const fullname = document.getElementById('fullname')?.value?.trim() || '';
          const brand = document.getElementById('brand')?.value?.trim() || '';
          const email = document.getElementById('email')?.value?.trim() || '';

          if (!fullname || !brand || !email) {
            alert('Molimo ispunite sva polja.');
            return;
          }

          if (!supabaseClient) {
            alert('Slanje trenutno nije dostupno. Molimo kontaktirajte nas na info@jannetolivier.com.');
            return;
          }

          const { data, error } = await supabaseClient
            .from('visits')
            .insert([{ fullname, brand, email }]);

          if (error) {
            alert('❌ Greška pri slanju. Pokušajte ponovno.');
            console.error(error);
          } else {
            alert('✅ Uspješno poslano! Verón vas promatra...');
            formEl.reset();
            window.location.href = 'thank-you.html';
          }
        });
      }
    }
  </script>
</body>
</html>
